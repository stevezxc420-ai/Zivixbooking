{% extends "base.html" %}
{% block title %}Admin Login — ZIVIX{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="44" height="44" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="7" fill="#c8f542"/>
                <path d="M9 10.5h14L10.5 21.5H23" stroke="#090a05" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>Admin Access</h1>
        <p class="auth-subtitle">Enter your password to manage ZIVIX scheduling.</p>

        <form method="POST" action="{{ url_for('admin_login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••••" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Sign In
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </form>

        <div class="auth-security-note">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span>Secure admin area</span>
        </div>
    </div>
</div>
{% endblock %}
